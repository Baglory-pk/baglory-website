<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baglory.pk</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#fff;
}

header {
  background:#fbeaea;
  text-align:center;
  padding:30px;
}

h1 {
  margin:0;
  font-size:32px;
}

.hero {
  text-align:center;
  padding:40px;
}

.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card {
  width:220px;
  border:1px solid #eee;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

button {
  background:#f8bcbc;
  border:none;
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

footer {
  text-align:center;
  padding:20px;
  background:#fbeaea;
}
</style>

</head>

<body>

<header>
  <h1>Baglory.pk</h1>
  <p>Handcrafted Elegance in Every Detail</p>
</header>

<section class="hero">
  <h2>Luxury Handmade Accessories</h2>
  <p>Crystal bags & beaded bracelets designed for your perfect look.</p>
</section>

<section class="products">

<div class="card">
  <img src="https://via.placeholder.com/200" width="100%">
  <h3>Crystal Bag</h3>
  <p>Rs. 2500</p>
  <button onclick="window.location.href='https://wa.me/923XXXXXXXXX'">
    Order on WhatsApp
  </button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" width="100%">
  <h3>Beaded Bracelet</h3>
  <p>Rs. 800</p>
  <button onclick="window.location.href='https://wa.me/923XXXXXXXXX'">
    Order on WhatsApp
  </button>
</div>

</section>

<footer>
  <p>Follow us on Instagram @baglory.pk</p>
</footer>

</body>
</html>
