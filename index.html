<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baglory</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:black;
  color:white;
  text-align:center;
  padding:40px;
}

/* PRODUCTS */
.section{
  padding:20px;
  text-align:center;
}

.slider{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.card{
  min-width:240px;
  background:white;
  border-radius:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
  padding:10px;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  cursor:pointer;
  border-radius:8px;
}

.cartBtn{
  background:green;
  color:white;
}

.checkoutBtn{
  background:black;
  color:white;
  width:200px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <h1>Baglory</h1>
  <p>Luxury Handmade Bags & Bracelets</p>
</header>

<div class="section">

<div class="slider">

  <div class="card">
    <img src="images/bag1.jpg">
    <h3>Crystal Bag</h3>
    <button class="cartBtn" onclick="add('Crystal Bag')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images/bag2.jpg">
    <h3>Pearl Bag</h3>
    <button class="cartBtn" onclick="add('Pearl Bag')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images/bracelet1.jpg">
    <h3>Bracelet</h3>
    <button class="cartBtn" onclick="add('Bracelet')">Add to Cart</button>
  </div>

</div>

<!-- GO TO CHECKOUT -->
<button class="checkoutBtn" onclick="goCheckout()">
Proceed to Checkout 🧾
</button>

</div>

<script>

let cart = [];

function add(p){
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(p + " added to cart");
}

function goCheckout(){
  window.location.href = "checkout.html";
}

</script>

</body>
</html>
