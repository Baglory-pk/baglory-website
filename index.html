<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baglory.pk</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

.hero {
  background:black;
  color:white;
  text-align:center;
  padding:60px;
}

/* PRODUCTS */
.section {padding:20px; text-align:center;}

.slider {display:flex; gap:15px; overflow-x:auto;}

.card {
  min-width:240px;
  background:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img {width:100%; height:200px; object-fit:cover;}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.buy {background:black; color:white;}
.cart {background:green; color:white;}

/* CART */
#cartBox {
  position:fixed;
  right:10px;
  top:10px;
  background:white;
  padding:10px;
  width:250px;
  border-radius:10px;
  box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

/* FORM */
.form {
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:6px 0;
}

.pay {
  background:#111;
  color:white;
  width:100%;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Baglory</h1>
  <p>Luxury Handmade Bags & Bracelets</p>
</div>

<!-- CART -->
<div id="cartBox">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
</div>

<!-- PRODUCTS -->
<div class="section">

<div class="slider">

  <div class="card">
    <img src="images/bag1.jpg">
    <h3>Crystal Bag</h3>
    <button class="buy" onclick="buyNow('Crystal Bag')">Buy Now</button>
    <button class="cart" onclick="add('Crystal Bag')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images/bag2.jpg">
    <h3>Pearl Bag</h3>
    <button class="buy" onclick="buyNow('Pearl Bag')">Buy Now</button>
    <button class="cart" onclick="add('Pearl Bag')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images/bracelet1.jpg">
    <h3>Bracelet</h3>
    <button class="buy" onclick="buyNow('Bracelet')">Buy Now</button>
    <button class="cart" onclick="add('Bracelet')">Add to Cart</button>
  </div>

</div>
</div>

<!-- CUSTOMER FORM -->
<div class="form">
  <h2>Checkout Details</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email Address">
  <input id="phone" placeholder="Phone Number">
  <input id="city" placeholder="City">
  <textarea id="address" placeholder="Full Address"></textarea>

  <select id="payment">
    <option value="COD">Cash on Delivery</option>
    <option value="JazzCash">JazzCash</option>
    <option value="Easypaisa">Easypaisa</option>
  </select>

  <button class="pay" onclick="placeOrder()">Place Order</button>
</div>

<script>

let cart = [];

/* ADD */
function add(p){
  cart.push(p);
  updateCart();
}

/* BUY NOW */
function buyNow(p){
  cart = [p];
  updateCart();
  alert("Added for quick checkout");
}

/* CART UI */
function updateCart(){
  document.getElementById("cartItems").innerHTML =
  cart.map(i => <p>${i}</p>).join("");
}

/* ORDER */
function placeOrder(){

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let city = document.getElementById("city").value;
  let address = document.getElementById("address").value;
  let payment = document.getElementById("payment").value;

  let order = {
    name, email, phone, city, address, payment,
    products: cart
  };

  // Save order temporarily
  localStorage.setItem("order", JSON.stringify(order));

  // redirect to confirmation page
  window.location.href = "success.html";
}

</script>

</body>
</html>

<a href="checkout.html">
<button class="btn buy-btn">Buy Now</button>
</a>

</div>
</div>
</div>

</section>

<!-- NECKLACES -->

<h2 class="section-title">Necklaces</h2>

<section class="products">

<div class="card">
<img src="necklace1.jpg">
<div class="card-content">
<h3>Luxury Necklace</h3>
<div class="price">Rs. 2,499</div>

<div class="btns">
<button class="btn cart-btn">Add to Cart</button>

<a href="checkout.html">
<button class="btn buy-btn">Buy Now</button>
</a>

</div>
</div>
</div>

</section>

<footer>
© 2026 Baglory — Handmade Luxury ✨
</footer>

</body>
</html>
