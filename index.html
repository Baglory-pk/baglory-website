<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baglory.pk</title>

<style>
<body>

<header>
  <h1>Baglory.pk</h1>
  <p>Handcrafted Elegance in Every Detail</p>

  <h3>🛒 Cart Items: <span id="cart-count">0</span></h3>
  <h3>Total: Rs. <span id="total-price">0</span></h3>
</header>

<section class="hero">
  <h2>Luxury Handmade Accessories</h2>
  <p>Crystal bags & beaded bracelets designed for your perfect look.</p>
</section>

<section class="products">

<div class="card">
  <img src="bag3.jpeg" width="100%">
  <h3>Crystal Bag</h3>
  <p>Rs. 1000</p>

  <button onclick="addToCart('Crystal Bag',1000)">
    Add to Cart
  </button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" width="100%">
  <h3>Beaded Bracelet</h3>
  <p>Rs. 800</p>

  <button onclick="addToCart('Beaded Bracelet',800)">
    Add to Cart
  </button>
</div>

</section>

<section style="padding:20px; text-align:center;">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<br>

<button onclick="checkoutCart()">
  Checkout on Instagram
</button>

</section>

<footer>
  <p>Follow us on Instagram @baglory.pk</p>
</footer>

<script>

let cart = [];
let total = 0;

function addToCart(product, price) {

  cart.push({product, price});

  total += price;

  updateCart();
}

function removeFromCart(index) {

  total -= cart[index].price;

  cart.splice(index, 1);

  updateCart();
}

function updateCart() {

  document.getElementById("cart-count").innerText = cart.length;

  document.getElementById("total-price").innerText = total;

  let cartHTML = "";

  cart.forEach((item, index) => {

    cartHTML += `
      <p>
        ${item.product} - Rs.${item.price}

        <button onclick="removeFromCart(${index})">
          Remove
        </button>
      </p>
    `;
  });

  document.getElementById("cart-items").innerHTML = cartHTML;
}

function checkoutCart() {

  window.open(
    "https://instagram.com/baglory.pk",
    "_blank"
  );
}

</script>

</body>
<header>
  <h1>Baglory.pk</h1>
  <p>Handcrafted Elegance in Every Detail</p>
</header>

<section class="hero">
  <h2>Luxury Handmade Accessories</h2>
  <p>Crystal bags & beaded bracelets designed for your perfect look.</p>
</section>

<section class="products">

<div class="card">
  <img src="bag3.jpeg" width="100%">
  <h3>Crystal Bag</h3>
  <p>Rs. 1000</p>
  <button onclick="window.location.href='https://instagram.com/baglory.pk'">
    Buy Now
  </button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" width="100%">
  <h3>Beaded Bracelet</h3>
  <p>Rs. 800</p>
  <button onclick="window.location.href='https://instagram.com/baglory.pk'">
    Buy Now
  </button>
</div>

</section>

<footer>
  <p>Follow us on Instagram @baglory.pk</p>
</footer>

</body>
</html>
