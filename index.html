<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baglory.pk</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#fff;
}

header {
  background:#fbeaea;
  text-align:center;
  padding:30px;
}

.hero {
  text-align:center;
  padding:40px;
}

.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card {
  width:220px;
  border:1px solid #eee;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

button {
  background:#f8bcbc;
  border:none;
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

footer {
  text-align:center;
  padding:20px;
  background:#fbeaea;
}
</style>

</head>

<body>

<header>
  <h1>Baglory.pk</h1>
  <p>Handcrafted Elegance in Every Detail</p>

  <h3>🛒 Cart: <span id="cart-count">0</span></h3>
  <h3>Total: Rs. <span id="total-price">0</span></h3>
</header>

<section class="hero">
  <h2>Luxury Handmade Accessories</h2>
  <p>Crystal bags & beaded bracelets designed for your perfect look.</p>
</section>

<section class="products">

<div class="card">
  <img src="bag3.jpeg" width="100%">
  <h3>Crystal Bag</h3>
  <p>Rs. 1000</p>
  <button onclick="addToCart('Crystal Bag',1000)">Add to Cart</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/200" width="100%">
  <h3>Beaded Bracelet</h3>
  <p>Rs. 800</p>
  <button onclick="addToCart('Beaded Bracelet',800)">Add to Cart</button>
</div>

</section>

<section style="text-align:center; padding:20px;">
<h2>Your Cart</h2>
<div id="cart-items"></div>

<br>

<button onclick="checkoutCart()">Checkout on Instagram</button>
</section>

<footer>
  <p>Follow us on Instagram @baglory.pk</p>
</footer>

<script>

let cart = [];
let total = 0;

function addToCart(product, price) {
  cart.push({product, price});
  total += price;
  updateCart();
}

function removeFromCart(index) {
  total -= cart[index].price;
  cart.splice(index, 1);
  updateCart();
}

function updateCart() {

  document.getElementById("cart-count").innerText = cart.length;
  document.getElementById("total-price").innerText = total;

  let html = "";

  for (let i = 0; i < cart.length; i++) {
    html += `
      <p>
        ${cart[i].product} - Rs.${cart[i].price}
        <button onclick="removeFromCart(${i})">Remove</button>
      </p>
    `;
  }

  document.getElementById("cart-items").innerHTML = html;
}

function checkoutCart() {
  window.open("https://instagram.com/baglory.pk", "_blank");
}

</script>

</body>
</html>
